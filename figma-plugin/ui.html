<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afterm Screen Importer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Pretendard', sans-serif;
      background: #1e1e1e;
      color: #fff;
      height: 560px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    .header {
      padding: 20px 20px 16px;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header p {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
      transition: background 0.3s;
    }
    .status-dot.online { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-dot.offline { background: #f44336; }
    .status-dot.checking { background: #ff9800; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── 옵션 패널 ── */
    .options {
      padding: 14px 20px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #aaa;
    }
    .option-item label { white-space: nowrap; }
    .option-item input[type="number"] {
      width: 48px;
      padding: 3px 6px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      text-align: center;
    }
    .option-item input[type="checkbox"] { cursor: pointer; }

    /* ── 스크린 목록 ── */
    .screens-header {
      padding: 12px 20px 8px;
      font-size: 11px;
      color: #666;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .screens-header span { font-size: 12px; color: #aaa; font-weight: 600; }
    .select-all {
      font-size: 11px;
      color: #7c6ff7;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
    }

    .screens-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }
    .screens-list::-webkit-scrollbar { width: 4px; }
    .screens-list::-webkit-scrollbar-track { background: transparent; }
    .screens-list::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }

    .screen-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .screen-item:hover { background: #2a2a2a; }
    .screen-item input[type="checkbox"] { cursor: pointer; accent-color: #7c6ff7; }
    .screen-item-info { flex: 1; }
    .screen-item-name { font-size: 12px; color: #ddd; }
    .screen-item-path { font-size: 10px; color: #555; margin-top: 1px; }
    .screen-item-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      background: #2a2a2a;
      color: #888;
    }
    .screen-item-badge.ok { background: #1a3a1a; color: #4caf50; }
    .screen-item-badge.error { background: #3a1a1a; color: #f44336; }
    .screen-item-badge.loading { background: #2a2a1a; color: #ff9800; }

    /* ── 진행률 ── */
    .progress-bar-wrap {
      padding: 0 20px 8px;
      display: none;
    }
    .progress-bar-bg {
      height: 4px;
      background: #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c6ff7, #9b8ff9);
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 10px;
      color: #666;
      text-align: right;
      margin-top: 4px;
    }

    /* ── 하단 버튼 ── */
    .footer {
      padding: 12px 20px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 9px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary {
      flex: 1;
      background: #7c6ff7;
      color: #fff;
    }
    .btn-primary:hover { background: #6a5de8; }
    .btn-primary:disabled { background: #3a3a4a; color: #666; cursor: not-allowed; }
    .btn-secondary {
      background: #2a2a2a;
      color: #aaa;
    }
    .btn-secondary:hover { background: #333; }

    /* ── 빈 상태 ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #555;
      padding: 20px;
      text-align: center;
    }
    .empty-state-icon { font-size: 32px; }
    .empty-state p { font-size: 12px; line-height: 1.6; }
    .empty-state code {
      background: #2a2a2a;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      color: #aaa;
      display: block;
      margin-top: 8px;
      text-align: left;
      font-family: monospace;
    }

    /* ── 완료 상태 ── */
    .done-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 20px;
    }
    .done-state-icon { font-size: 40px; }
    .done-state h2 { font-size: 16px; color: #4caf50; }
    .done-state p { font-size: 12px; color: #888; }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<div class="header">
  <h1>
    <span class="status-dot checking" id="statusDot"></span>
    Afterm Screen Importer
  </h1>
  <p id="statusText">로컬 서버 연결 확인 중...</p>
</div>

<!-- ── 콘텐츠 영역 ── -->
<div id="mainContent" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">

  <!-- 옵션 패널 -->
  <div class="options" id="optionsPanel" style="display:none">
    <div class="option-item">
      <label>열 수</label>
      <input type="number" id="optCols" value="4" min="1" max="8" />
    </div>
    <div class="option-item">
      <label>간격 (px)</label>
      <input type="number" id="optGap" value="80" min="0" max="200" />
    </div>
    <div class="option-item">
      <input type="checkbox" id="optSection" checked />
      <label for="optSection">섹션으로 묶기</label>
    </div>
  </div>

  <!-- 선택 헤더 -->
  <div class="screens-header" id="screensHeader" style="display:none">
    <span id="selectedCount">0개 선택됨</span>
    <button class="select-all" id="selectAllBtn" onclick="toggleSelectAll()">전체 선택</button>
  </div>

  <!-- 스크린 목록 -->
  <div class="screens-list" id="screensList"></div>

  <!-- 빈 상태 (서버 오프라인) -->
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-state-icon">🔌</div>
    <p>로컬 서버에 연결할 수 없어요.<br />먼저 터미널에서 아래 명령어를 실행하세요:</p>
    <code>
      cd scripts/figma-capture<br />
      npm install<br />
      npm start
    </code>
  </div>

  <!-- 진행 중 완료 상태 -->
  <div class="done-state" id="doneState" style="display:none">
    <div class="done-state-icon">🎉</div>
    <h2 id="doneTitle">임포트 완료!</h2>
    <p id="doneDesc"></p>
  </div>

</div>

<!-- 진행률 바 -->
<div class="progress-bar-wrap" id="progressWrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText"></div>
</div>

<!-- 푸터 -->
<div class="footer" id="footer">
  <button class="btn btn-secondary" onclick="refresh()">새로고침</button>
  <button class="btn btn-primary" id="importBtn" disabled onclick="startImport()">
    선택 항목 임포트
  </button>
</div>

<script>
  const SERVER = 'http://localhost:3456';
  let screenshots = [];
  let selected = new Set();
  let allSelected = false;

  // ── 초기화 ──
  window.onload = () => {
    checkServer();
  };

  async function checkServer() {
    setStatus('checking', '로컬 서버 연결 확인 중...');
    try {
      const res = await fetch(`${SERVER}/metadata`, { signal: AbortSignal.timeout(3000) });
      if (!res.ok) throw new Error('서버 응답 오류');
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      screenshots = data;
      selected = new Set(screenshots.map(s => s.filename));
      allSelected = true;

      setStatus('online', `서버 연결됨 · ${screenshots.length}개 스크린 준비`);
      showScreensList();
    } catch (err) {
      setStatus('offline', '서버 연결 실패 — 로컬 서버를 먼저 실행하세요');
      showEmpty();
    }
  }

  function setStatus(state, text) {
    document.getElementById('statusDot').className = `status-dot ${state}`;
    document.getElementById('statusText').textContent = text;
  }

  function showScreensList() {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('doneState').style.display = 'none';
    document.getElementById('optionsPanel').style.display = 'flex';
    document.getElementById('screensHeader').style.display = 'flex';
    document.getElementById('importBtn').disabled = false;

    const list = document.getElementById('screensList');
    list.innerHTML = '';
    updateSelectedCount();

    screenshots.forEach(shot => {
      const item = document.createElement('div');
      item.className = 'screen-item';
      item.innerHTML = `
        <input type="checkbox" id="chk_${shot.filename}"
          ${selected.has(shot.filename) ? 'checked' : ''}
          onchange="toggleItem('${shot.filename}')" />
        <div class="screen-item-info">
          <div class="screen-item-name">${shot.name}</div>
          <div class="screen-item-path">${shot.path}</div>
        </div>
        <span class="screen-item-badge ok" id="badge_${shot.filename}">준비</span>
      `;
      item.onclick = (e) => {
        if (e.target.tagName !== 'INPUT') {
          const chk = document.getElementById(`chk_${shot.filename}`);
          chk.checked = !chk.checked;
          toggleItem(shot.filename);
        }
      };
      list.appendChild(item);
    });
  }

  function showEmpty() {
    document.getElementById('screensList').innerHTML = '';
    document.getElementById('optionsPanel').style.display = 'none';
    document.getElementById('screensHeader').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('importBtn').disabled = true;
  }

  function toggleItem(filename) {
    if (selected.has(filename)) {
      selected.delete(filename);
    } else {
      selected.add(filename);
    }
    updateSelectedCount();
    document.getElementById('importBtn').disabled = selected.size === 0;
  }

  function toggleSelectAll() {
    allSelected = !allSelected;
    if (allSelected) {
      selected = new Set(screenshots.map(s => s.filename));
    } else {
      selected.clear();
    }
    screenshots.forEach(s => {
      const chk = document.getElementById(`chk_${s.filename}`);
      if (chk) chk.checked = allSelected;
    });
    document.getElementById('selectAllBtn').textContent = allSelected ? '전체 해제' : '전체 선택';
    updateSelectedCount();
    document.getElementById('importBtn').disabled = selected.size === 0;
  }

  function updateSelectedCount() {
    document.getElementById('selectedCount').textContent = `${selected.size}개 선택됨`;
    document.getElementById('importBtn').textContent =
      selected.size === 0 ? '선택 항목 임포트' : `${selected.size}개 임포트`;
  }

  function refresh() {
    checkServer();
  }

  // ── 임포트 시작 ──
  async function startImport() {
    const toImport = screenshots.filter(s => selected.has(s.filename));
    if (toImport.length === 0) return;

    document.getElementById('importBtn').disabled = true;
    document.getElementById('progressWrap').style.display = 'block';

    const loaded = [];

    for (let i = 0; i < toImport.length; i++) {
      const shot = toImport[i];
      updateProgress(i, toImport.length, shot.name);
      setBadge(shot.filename, 'loading', '로딩 중');

      try {
        const res = await fetch(`${SERVER}/screenshot/${encodeURIComponent(shot.filename)}`);
        if (!res.ok) throw new Error('이미지 로드 실패');
        const blob = await res.blob();
        const arrayBuffer = await blob.arrayBuffer();

        loaded.push({
          name: shot.name,
          bytes: Array.from(new Uint8Array(arrayBuffer)),
          width: shot.width || 390,
          height: shot.height || 844,
        });
        setBadge(shot.filename, 'ok', '완료');
      } catch (err) {
        console.error(err);
        setBadge(shot.filename, 'error', '실패');
      }
    }

    updateProgress(toImport.length, toImport.length, '');

    // Figma 플러그인 코드로 전송
    parent.postMessage({
      pluginMessage: {
        type: 'import-screenshots',
        screenshots: loaded,
        options: {
          columns: parseInt(document.getElementById('optCols').value) || 4,
          gap: parseInt(document.getElementById('optGap').value) || 80,
          createSection: document.getElementById('optSection').checked,
          frameWidth: 390,
          frameHeight: 844,
        },
      }
    }, '*');
  }

  function updateProgress(current, total, name) {
    const pct = total === 0 ? 0 : Math.round((current / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent =
      current < total ? `${current}/${total} — ${name}` : `${total}/${total} 로드 완료, Figma에 배치 중...`;
  }

  function setBadge(filename, state, text) {
    const badge = document.getElementById(`badge_${filename}`);
    if (badge) {
      badge.className = `screen-item-badge ${state}`;
      badge.textContent = text;
    }
  }

  // ── Figma 플러그인으로부터 메시지 수신 ──
  window.onmessage = (event) => {
    const msg = event.data?.pluginMessage;
    if (!msg) return;

    if (msg.type === 'progress') {
      updateProgress(msg.current, msg.total, msg.name);
    } else if (msg.type === 'done') {
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('screensList').innerHTML = '';
      document.getElementById('optionsPanel').style.display = 'none';
      document.getElementById('screensHeader').style.display = 'none';
      document.getElementById('doneState').style.display = 'flex';
      document.getElementById('doneTitle').textContent =
        msg.failCount === 0 ? '임포트 완료! 🎉' : '임포트 완료 (일부 실패)';
      document.getElementById('doneDesc').textContent =
        `${msg.successCount}개 성공${msg.failCount > 0 ? `, ${msg.failCount}개 실패` : ''}`;
      document.getElementById('importBtn').textContent = '다시 임포트';
      document.getElementById('importBtn').disabled = false;
    } else if (msg.type === 'error') {
      alert('오류: ' + msg.message);
      document.getElementById('importBtn').disabled = false;
    }
  };
</script>
</body>
</html>
